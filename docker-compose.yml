services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: crm_postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm_network

  # Redis
  redis:
    image: redis:7
    container_name: crm_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - crm_network

  # Django Backend
  backend:
    build:
      context: ./crm_core
      dockerfile: Dockerfile
    container_name: crm_backend
    env_file: .env
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_brands &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 crm_core.wsgi:application"
    volumes:
      - backend_static:/app/backend_static
      - media:/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm_network

  # Frontend build
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.frontend
    container_name: crm_frontend
    env_file: .env
    volumes:
      - static:/staticfiles
    command: sh -c "cp -r /app/dist/. /staticfiles/ && echo 'Frontend files copied to /staticfiles/' && sleep infinity"
    networks:
      - crm_network

  # Nginx Gateway
  gateway:
    build: ./gateway/
    container_name: crm_gateway
    env_file: .env
    volumes:
      - static:/staticfiles
      - backend_static:/staticfiles/backend_static
      - media:/app/media
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - crm_network

  # Celery Worker
  celery_worker:
    build:
      context: ./crm_core
      dockerfile: Dockerfile
    container_name: crm_celery_worker
    env_file: .env
    command: celery -A crm_core worker -l info
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm_network

  # Celery Beat
  celery_beat:
    build:
      context: ./crm_core
      dockerfile: Dockerfile
    container_name: crm_celery_beat
    env_file: .env
    command: celery -A crm_core beat -l info
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm_network

  # Telegram Bot
  telegram_bot:
    build:
      context: ./crm_core
      dockerfile: Dockerfile
    container_name: crm_telegram_bot
    env_file: .env
    command: python bot/main.py
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm_network

volumes:
  postgres_data:
  redis_data:
  static:
  backend_static:
  media:

networks:
  crm_network:
    driver: bridge
