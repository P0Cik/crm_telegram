services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm_network

  # Redis для Celery и кэширования
  redis:
    image: redis:7-alpine
    container_name: crm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - crm_network

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: crm_backend
    environment:
      - DEBUG=True
      - DJANGO_SECRET_KEY=your-secret-key-change-in-production
      - POSTGRES_DB=crm_db
      - POSTGRES_USER=crm_user
      - POSTGRES_PASSWORD=crm_password
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
    volumes:
      - ./crm_core:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm_network
    command: sh -c "python manage.py migrate && python manage.py seed_brands && python manage.py collectstatic --noinput && gunicorn crm_core.wsgi:application --bind 0.0.0.0:8000 --workers 4"

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: crm_celery_worker
    environment:
      - DEBUG=False
      - POSTGRES_DB=crm_db
      - POSTGRES_USER=crm_user
      - POSTGRES_PASSWORD=crm_password
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - ./crm_core:/app
      - media_volume:/app/media
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - crm_network
    command: celery -A crm_core worker -l info

  # Celery Beat (планировщик задач)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: crm_celery_beat
    environment:
      - DEBUG=False
      - POSTGRES_DB=crm_db
      - POSTGRES_USER=crm_user
      - POSTGRES_PASSWORD=crm_password
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./crm_core:/app
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - crm_network
    command: celery -A crm_core beat -l info

  # Telegram Bot
  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: crm_telegram_bot
    environment:
      - DEBUG=False
      - POSTGRES_DB=crm_db
      - POSTGRES_USER=crm_user
      - POSTGRES_PASSWORD=crm_password
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - WEBAPP_URL=${WEBAPP_URL}
      - DJANGO_SETTINGS_MODULE=crm_core.settings
    volumes:
      - ./crm_core:/app
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - crm_network
    command: python bot/main.py

  # React Frontend with Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: crm_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - crm_network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  crm_network:
    driver: bridge
