server {
    listen 80;
    server_name localhost;
    client_max_body_size 20M;

    # API запросы
    location /api/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Пробрасываем Telegram заголовки
        proxy_set_header X-Telegram-User-Id $http_x_telegram_user_id;
        proxy_set_header X-Telegram-First-Name $http_x_telegram_first_name;
        proxy_set_header X-Telegram-Last-Name $http_x_telegram_last_name;
        proxy_set_header X-Telegram-Username $http_x_telegram_username;
        proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;

        proxy_pass http://backend:8000/api/;
    }

    # Django Admin
    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:8000/admin/;
    }

    # Статика бэкенда
    location /static/ {
        alias /staticfiles/backend_static/;
    }

    # Медиа файлы через backend
    location /media/ {
        proxy_pass http://backend:8000/media/;
    }

    # Frontend React приложение - все остальные запросы
    location / {
        alias /staticfiles/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
